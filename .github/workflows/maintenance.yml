name: Maintenance Triage Agent

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests reportlab

      - name: Run maintenance triage agent
        env:
          DOORLOOP_API_KEY:    ${{ secrets.DOORLOOP_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          MANAGER_EMAIL:       ${{ secrets.MANAGER_EMAIL }}
        run: python maintenance_agent.py

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-run-${{ github.run_id }}
          path: maintenance.db
          if-no-files-found: ignore
          retention-days: 90
